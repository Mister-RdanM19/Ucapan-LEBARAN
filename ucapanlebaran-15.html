<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Message #15 - Mr.Rm19</title>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Tenor+Sans&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #080808; color: #fff; font-family: 'Tenor Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .frame-15 { border: 2px solid #d4af37; padding: 60px 40px; position: relative; max-width: 600px; text-align: center; background: rgba(212, 175, 55, 0.03); }
        .frame-15::before, .frame-15::after { content: '🏮'; position: absolute; font-size: 2em; top: -25px; left: 50%; transform: translateX(-50%); filter: drop-shadow(0 0 10px #d4af37); }
        .frame-15::after { top: auto; bottom: -25px; }
        h1 { font-family: 'Marcellus', serif; color: #d4af37; font-size: 2.5em; margin-bottom: 25px; letter-spacing: 2px; }
        p { font-size: 1.4em; line-height: 1.8; color: #f0f0f0; }
        .highlight { color: #d4af37; font-weight: bold; }
    </style>
</head>
<body>
    <div class="frame-15">
        <h1>Eid Mubarak</h1>
        <p>"Semoga Allah memberkahi setiap langkah kita, <span class="highlight">N3i</span>. Agar Lebaran tahun depan, kita tidak lagi saling berkirim pesan, melainkan saling berjabat tangan di satu atap."</p>
    </div>
</body>
