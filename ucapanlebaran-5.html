<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Message #5 - Mr.Rm19</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(45deg, #050505, #1a0f00, #050505, #000d05); background-size: 400% 400%; animation: aurora 15s ease infinite; font-family: 'Playfair Display', serif; }
        @keyframes aurora { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.3); padding: 60px 40px; text-align: center; border-radius: 2px; box-shadow: 0 0 50px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .glass-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent); animation: shine 5s infinite; }
        @keyframes shine { to { left: 100%; } }
        .gold-text { color: #ffcf40; font-size: 2.2em; line-height: 1.6; text-shadow: 0 0 20px rgba(255, 207, 64, 0.3); }
        .subtitle-5 { color: #888; letter-spacing: 4px; font-size: 0.7em; margin-bottom: 30px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="subtitle-5">Encryption Level: Sacred</div>
        <p class="gold-text">
            "Di hari yang suci ini, aku memohon kepada Allah, agar cinta kita diredhai menjadi cinta yang 'Till Jannah'. Eid Mubarak, N3i."
        </p>
    </div>
</body>
</html>
