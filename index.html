<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Ucapan Lebaran - Mr.Rm19</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hijau-ketupat: #2e7d32;
            --emas-premium: #d4af37;
            --putih-bersih: #fdfdfd;
        }

        body {
            margin: 0;
            padding: 0;
            background: #f4f7f4;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Background Pattern --- */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--hijau-ketupat) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            opacity: 0.05;
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 50px 20px;
            background: white;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 4px solid var(--emas-premium);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--hijau-ketupat);
            font-size: 2.2em;
            margin: 0;
        }

        header p {
            color: #666;
            font-size: 0.9em;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* --- Container Menu --- */
        .container {
            max-width: 1000px;
            width: 90%;
            margin: 40px 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        /* --- Card Pilihan --- */
        .pilihan-btn {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        /* Ikon Ketupat di tiap Tombol */
        .ketupat-icon {
            width: 40px;
            height: 40px;
            background: var(--hijau-ketupat);
            transform: rotate(45deg);
            margin-bottom: 20px;
            border: 2px solid var(--emas-premium);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.5s ease;
        }

        .ketupat-icon::after {
            content: '';
            width: 70%;
            height: 70%;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .pilihan-btn:hover {
            border-color: var(--emas-premium);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.1);
        }

        .pilihan-btn:hover .ketupat-icon {
            transform: rotate(225deg);
            background: var(--emas-premium);
        }

        .pilihan-btn span.label {
            font-weight: 700;
            font-size: 1.1em;
            color: var(--hijau-ketupat);
        }

        .pilihan-btn span.sub {
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
            margin-top: 5px;
        }

        footer {
            margin: 40px 0;
            color: #888;
            font-size: 0.8em;
            text-align: center;
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <header>
        <h1>IDUL FITRI 1447H</h1>
        <p>Silakan Pilih Pesan untuk N3i</p>
    </header>

    <div class="container" id="menu-grid">
        </div>

    <footer>
        Dibuat dengan tulus oleh <strong>Mr.Rm19</strong>
    </footer>

    <script>
        const grid = document.getElementById('menu-grid');
        
        for (let i = 1; i <= 20; i++) {
            const btn = document.createElement('a');
            btn.href = `ucapanlebaran-${i}.html`;
            btn.className = 'pilihan-btn';
            
            const num = i < 10 ? `0${i}` : i;
            
            btn.innerHTML = `
                <div class="ketupat-icon"></div>
                <span class="label">PILIHAN ${num}</span>
                <span class="sub">Klik untuk Buka</span>
            `;
            
            grid.appendChild(btn);
        }
    </script>
</body>
</html>
