    <style>

    </style>
</head>

    <svg class="lantern" width="80" height="150" viewBox="0 0 100 150">

        <rect x="30" y="40" width="40" height="60" fill="none" stroke="#00ff41" stroke-width="3" />
        <circle cx="50" cy="70" r="10" fill="#00ff41"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
    </svg>
    <div class="box-4">
        <h1 class="h-4">EID.LOG_04</h1>
        <p class="p-4">"N3i, bagiku, senyummu di hari Lebaran ini adalah <span class="highlight">takbiran terindah</span> yang menggema di hatiku. Mohon maaf lahir dan batin, partner hidupku."</p>
