<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Message #2 for N3i</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@1,400&display=swap" rel="stylesheet">
    <style>
        :root { --main-gold: #ffcf40; --dark-bg: #000000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--dark-bg); font-family: 'Lora', serif; display: flex; align-items: center; justify-content: center; }

        /* SVG Background: Silhouette Masjid Bercahaya */
        .background-mosque { position: absolute; bottom: 0; width: 100%; height: 60%; opacity: 0.2; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffcf40" d="M0,224L120,208C240,192,480,160,720,160C960,160,1200,192,1320,208L1440,224L1440,320L1320,320C1200,320,960,320,720,320C480,320,240,320,120,320L0,320Z"></path><path fill="%23d4af37" d="M0,160L120,176C240,192,480,224,720,224C960,224,1200,192,1320,176L1440,160L1440,320L1320,320C1200,320,960,320,720,320C480,320,240,320,120,320L0,320Z" opacity="0.5"></path></svg>'); background-size: cover; background-repeat: no-repeat; z-index: 1; }

        /* Teks Content */
        .content-wrapper { position: relative; z-index: 10; max-width: 650px; text-align: center; padding: 30px; }
        
        h1.title-eid { font-family: 'Cinzel Decorative', cursive; color: var(--main-gold); font-size: 2.5em; text-transform: uppercase; margin-bottom: 40px; text-shadow: 0 0 15px var(--main-gold); animation: pulse Glow 2s infinite; }
        p.message-text { color: #fff; font-size: 1.4em; line-height: 1.8; font-style: italic; font-weight: 300; animation: fadeIn 3s; }
        span.highlight { color: var(--main-gold); font-weight: bold; }
        .from-sig { margin-top: 50px; color: rgba(255,255,255,0.5); letter-spacing: 1px; animation: fadeIn 4s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulseGlow { 0% { text-shadow: 0 0 10px var(--main-gold); } 50% { text-shadow: 0 0 25px var(--main-gold); } 100% { text-shadow: 0 0 10px var(--main-gold); } }

    </style>
</head>
<body>

    <div class="background-mosque"></div>

    <div class="content-wrapper">
        <h1 class="title-eid">Eid Mubarak</h1>
        <p class="message-text">
            "Selamat Lebaran, N3i. Di antara beribu keindahan Idul Fitri, yang paling kusyukuri adalah hadirmu sebagai <span class="highlight">pelengkap separuh agamaku</span>. Maafkan segala khilafku, Sayang."
        </p>
        <div class="from-sig">[ MR.RM19 // THE MESSAGE #02 ]</div>
    </div>

</body>
</html>
