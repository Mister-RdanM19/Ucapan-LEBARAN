<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Message #6 - Mr.Rm19</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .bg-glow { position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,255,65,0.15) 0%, transparent 70%); z-index: 1; }
        
        /* CSS Ketupat */
        .ketupat { width: 60px; height: 60px; background: #d4af37; transform: rotate(45deg); margin: 0 auto 40px; border: 4px solid #fff; box-shadow: 0 0 20px rgba(212,175,55,0.6); animation: pulse 2s infinite; position: relative; z-index: 5; }
        @keyframes pulse { 0% { transform: rotate(45deg) scale(1); } 50% { transform: rotate(45deg) scale(1.1); } 100% { transform: rotate(45deg) scale(1); } }

        .container { position: relative; z-index: 10; text-align: center; max-width: 500px; padding: 20px; }
        h1 { font-size: 1em; letter-spacing: 5px; color: #d4af37; margin-bottom: 20px; text-transform: uppercase; }
        p { font-size: 1.4em; line-height: 1.6; font-weight: 400; color: #ececec; }
        .highlight { color: #d4af37; font-weight: 700; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="ketupat"></div>
        <h1>Message #06</h1>
        <p>"Lebaran kali ini terasa berbeda karena aku tahu, di setiap sujudku dan sujudmu, ada <span class="highlight">nama kita</span> yang saling tertaut dalam doa. Maafkan aku, N3i."</p>
    </div>
</body>
</html>
