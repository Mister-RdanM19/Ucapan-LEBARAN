<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Message #7 - Mr.Rm19</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Roboto', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .lantern-svg { position: absolute; top: 0; width: 80px; filter: drop-shadow(0 0 10px #d4af37); opacity: 0.7; }
        .left { left: 10%; } .right { right: 10%; }
        
        .content { border-top: 2px solid #d4af37; border-bottom: 2px solid #d4af37; padding: 40px 20px; max-width: 600px; background: rgba(212,175,55,0.05); }
        h2 { font-family: 'Playfair Display', serif; color: #d4af37; font-size: 2.2em; margin-bottom: 20px; }
        p { font-size: 1.3em; line-height: 1.7; color: #f0f0f0; margin: 0; }
    </style>
</head>
<body>
    <svg class="lantern-svg left" viewBox="0 0 100 200"><path d="M50,0 L50,40 M30,40 L70,40 L80,100 L20,100 Z" stroke="#d4af37" fill="none" stroke-width="2"/><circle cx="50" cy="70" r="10" fill="#d4af37"/></svg>
    <svg class="lantern-svg right" viewBox="0 0 100 200"><path d="M50,0 L50,40 M30,40 L70,40 L80,100 L20,100 Z" stroke="#d4af37" fill="none" stroke-width="2"/><circle cx="50" cy="70" r="10" fill="#d4af37"/></svg>

    <div class="content">
        <h2>Doa Untuk N3i</h2>
        <p>"Ya Allah, jagalah hati N3i agar selalu dalam lindungan-Mu, dan jadikanlah aku satu-satunya lelaki yang Kau izinkan menjaganya. Selamat Idul Fitri."</p>
    </div>
</body>
</html>
