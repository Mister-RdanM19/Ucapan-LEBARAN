<!DOCTYPE html>
<html lang="id">
<head>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050505; color: #00ff41; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .frame { border: 1px solid #00ff41; padding: 40px; position: relative; max-width: 550px; box-shadow: inset 0 0 20px rgba(0,255,65,0.2); }
        .corner { position: absolute; width: 20px; height: 20px; border: 3px solid #00ff41; }
        .top-left { top: -10px; left: -10px; border-right: none; border-bottom: none; }
        .bottom-right { bottom: -10px; right: -10px; border-left: none; border-top: none; }
        
        /* Ikon Ketupat Neon */
        .ketupat-mini { font-size: 2em; margin-bottom: 20px; display: block; animation: flicker 3s infinite; }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .text-main { font-size: 1.3em; line-height: 1.5; color: #fff; }
        .label { color: #00ff41; font-weight: 800; display: block; margin-top: 20px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="frame">
        <div class="corner top-left"></div>
        <div class="corner bottom-right"></div>
        <span class="ketupat-mini">◈</span>
        <div class="text-main">
            "Selamat Idul Fitri, N3i. Semoga keberkahan Ramadhan kemarin menjadikan kita pribadi yang lebih sabar dalam merajut mimpi kita bersama."

    </div>
</body>
